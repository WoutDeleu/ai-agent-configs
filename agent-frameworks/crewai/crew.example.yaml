crew:
  process: sequential
  verbose: false
  memory: false

agents:
  - role: Researcher
    goal: Find accurate and relevant information on the given topic.
    backstory: You are an expert researcher with a knack for finding the right sources.
    llm: claude-sonnet-4-6
    tools: []

  - role: Writer
    goal: Produce a clear, concise report based on the research.
    backstory: You are a skilled technical writer who distills complex information.
    llm: claude-sonnet-4-6
    tools: []

tasks:
  - description: Research {{topic}}
    agent: Researcher
    expected_output: A structured summary of findings.

  - description: Write a report based on the research.
    agent: Writer
    expected_output: A polished Markdown report.
